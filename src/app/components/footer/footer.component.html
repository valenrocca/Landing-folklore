<footer class="footer">
  <nav class="footer__social" aria-label="Redes sociales">
    @for (link of socialLinks; track link.label) {
      <a
        class="footer__social-link"
        [href]="link.href"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="link.label"
      >
        <img [src]="link.image" alt="" class="footer__social-img" />
      </a>
    }
  </nav>
</footer>
