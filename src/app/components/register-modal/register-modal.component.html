<div
  class="register"
  [class.register--success]="submitSuccess"
  role="dialog"
  aria-modal="true"
  aria-labelledby="register-logo"
>
  <div class="register__frame" (click)="$event.stopPropagation()">
    <div class="register__panel">
      <img
        id="register-logo"
        src="assets/images/logo-header.png"
        alt="República Folklore"
        class="register__logo"
      />

      @if (submitSuccess) {
        <p class="register__feedback register__feedback--success">
          ¡Registro exitoso! Te esperamos en el festival.
        </p>
      } @else if (mode === 'register') {
        @if (submitError) {
          <p class="register__feedback register__feedback--error">
            {{ submitError }}
          </p>
        }

        <form class="register__form" [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="register__field">
            <input
              id="nombre"
              type="text"
              formControlName="nombre"
              placeholder="Nombre"
              autocomplete="given-name"
              aria-label="Nombre"
              [class.register__input--error]="hasError('nombre')"
            />
          </div>

          <div class="register__field">
            <input
              id="apellido"
              type="text"
              formControlName="apellido"
              placeholder="Apellido"
              autocomplete="family-name"
              aria-label="Apellido"
              [class.register__input--error]="hasError('apellido')"
            />
          </div>

          <div class="register__field">
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="Mail"
              autocomplete="email"
              aria-label="Mail"
              [class.register__input--error]="hasError('email')"
            />
          </div>

          <button
            type="submit"
            class="register__submit"
            [disabled]="isSubmitting"
          >
            {{ isSubmitting ? 'Enviando...' : 'Enviar' }}
          </button>
        </form>

        <p class="register__switch">
          Si ya estás registrado tocá
          <a class="register__switch-link" (click)="showLogin()" role="button" tabindex="0" (keydown.enter)="showLogin()">aquí</a>
        </p>
      } @else {
        @if (loginError) {
          <p class="register__feedback register__feedback--error">
            {{ loginError }}
          </p>
        }

        <form
          class="register__form"
          [formGroup]="loginForm"
          (ngSubmit)="onLogin()"
        >
          <div class="register__field">
            <input
              id="login-email"
              type="email"
              formControlName="email"
              placeholder="Mail"
              autocomplete="email"
              aria-label="Mail"
              [class.register__input--error]="hasLoginError('email')"
            />
          </div>

          <button
            type="submit"
            class="register__submit"
            [disabled]="isSubmitting"
          >
            {{ isSubmitting ? 'Verificando...' : 'Ingresar' }}
          </button>
        </form>

        <p class="register__switch">
          ¿No estás registrado? Tocá
          <a class="register__switch-link" (click)="showRegister()" role="button" tabindex="0" (keydown.enter)="showRegister()">aquí</a>
        </p>
      }
    </div>
  </div>
</div>
