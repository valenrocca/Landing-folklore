<section class="page page--fit" [class.page--modal-open]="showRegister">
  <div class="page__content hero">
    <div class="hero__body">
      <img
        src="assets/images/logo.png"
        alt="República Folklore — 21 y 22 de noviembre 2026, Parque de la Ciudad"
        class="hero__logo"
      />

      <div class="hero__actions">
        <button
          type="button"
          class="btn-hero btn-hero--register"
          (click)="openRegister()"
        >
          Registrate
        </button>
        <a href="#" class="btn-hero btn-hero--tickets">Comprar entradas</a>
      </div>
    </div>
  </div>

  <div class="home-footer" [class.home-footer--hidden]="showRegister" aria-hidden="true"></div>

  @if (showRegister) {
    <app-register-modal />
  }
</section>
