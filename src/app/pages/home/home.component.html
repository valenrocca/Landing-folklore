<section class="page page--fit festival-bg grain">
  <div class="page__content hero">
    <div class="hero__body">
      <img
        src="assets/images/logo.png"
        alt="República Folklore — 21 y 22 de noviembre 2026, Parque de la Ciudad"
        class="page-logo"
      />

      <div class="hero__cta">
        <app-countdown class="countdown--compact" />

        <div class="hero__copy">
          <p class="hero__hook text-accent">Vos que sos un manija</p>
          <p class="hero__subhook">Sumate a la comunidad</p>
        </div>

        <div class="hero__actions">
          <button
            type="button"
            class="btn-pill btn-pill--compact"
            (click)="openRegister()"
          >
            Registrate
          </button>
          <a href="#" class="btn-pill btn-pill--compact">Comprar entradas</a>
        </div>
      </div>
    </div>
  </div>

  @if (showRegister) {
    <app-register-modal
      (closed)="closeRegister()"
      (submitted)="onRegisterSubmit($event)"
    />
  }
</section>
